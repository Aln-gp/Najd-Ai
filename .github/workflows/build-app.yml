name: Najd AI Pure Stable Build

on:
  push:
    branches: [ "main" ]

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Java Environment
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter Framework
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean & Build Release
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: android-v${{ github.run_number }}
          token: ${{ secrets.GH_TOKEN }}
          name: "تطبيق Najd AI - نسخة أندرويد جاهزة #${{ github.run_number }}"

  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Flutter Framework
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean & Build iOS
        run: |
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Bundle iOS into IPA Archive
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos && zip -r user_app_ios.ipa Payload

      - name: Upload IPA to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: build/ios/iphoneos/user_app_ios.ipa
          tag_name: ios-v${{ github.run_number }}
          token: ${{ secrets.GH_TOKEN }}
          name: "تطبيق Najd AI - نسخة آيفون جاهزة #${{ github.run_number }}"
          
