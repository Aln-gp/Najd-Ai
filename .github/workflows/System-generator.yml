name: Najd AI Ultimate System Generator (Dockerized Stable Build) 🚀

on:
  repository_dispatch:
    types: [create_new_system]
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:stable
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      # 1. تطهير وبناء الهيكل الجديد
      - name: Clean & Fresh Structure
        run: |
          rm -rf android ios
          flutter create . --project-name=blink --platforms=android --org com.blacklink

      # 2. الحل الجذري: التعامل مع ملفات kts وفرض الإصدار 36 عالمياً
      - name: Override Android SDK to 36 (Kotlin DSL & Groovy)
        run: |
          # النجمة (*) في الأخير تخلي الأمر يصيد الملف سواء كان اسمه build.gradle أو build.gradle.kts
          sed -i 's/flutter.compileSdkVersion/36/g' android/app/build.gradle* || true
          sed -i 's/flutter.targetSdkVersion/36/g' android/app/build.gradle* || true
          
          # سكربت تهيئة عالمي (Init Script) يفرض على كل المكتبات الخارجية استخدام 36 فوراً
          mkdir -p ~/.gradle/init.d
          cat << 'EOF' > ~/.gradle/init.d/force_compile_sdk.gradle
          allprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 36
                      }
                  }
              }
          }
          EOF

      # 3. تحميل المكاتب
      - name: Fetch Dependencies
        run: flutter pub get

      # 4. البناء المباشر للملفات
      - name: Build Production APK & AAB
        run: |
          flutter build apk --release \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          
          flutter build appbundle --release \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}

      # 5. رفع الملفات الجاهزة للريليز
      - name: Deploy Android Artifacts
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: "v1.0.${{ github.run_number }}"
          name: "إصدار النظام المعتمد رقم ${{ github.run_number }} 🛠️"
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Fresh iOS Rebase
        run: |
          rm -rf ios
          flutter create . --project-name=blink --platforms=ios --org com.blacklink

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Compile iOS IPA
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r Najd_AI_iOS.ipa Payload

      - name: Deploy iOS Artifact
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: "v1.0.${{ github.run_number }}"
          name: "إصدار النظام المعتمد رقم ${{ github.run_number }} 🛠️"
          files: Najd_AI_iOS.ipa
          
