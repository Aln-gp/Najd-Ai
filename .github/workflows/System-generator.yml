name: Najd AI Ultimate System Generator (Android & iOS) 🚀

on:
  repository_dispatch:
    types: [create_new_system]
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. إنشاء مجلدات المنصات النظيفة
      - name: Recreate Android & iOS Folders
        run: |
          rm -rf android ios
          flutter create . --platforms=android,ios --org com.alnofaie.najdai

      # 2. الحل المحلي الأقوى: إجبار الجرادل الرئيسي والمكتبات الفرعية على إصداراتك (أندرويد 6 إلى 16/17)
      - name: Inject Global SDK Overrides to Gradle
        run: |
          cat << 'EOF' >> android/build.gradle

          // سكريبت محلي يجبر المشروع وكل المكتبات الخارجية (مثل file_picker) على نفس الإصدارات
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdk 36
                          defaultConfig {
                              minSdk 23
                              targetSdk 36
                          }
                      }
                  }
              }
          }
          EOF

       Silber - name: Install Dependencies
        run: flutter pub get

      # 3. البناء المستقر والمباشر
      - name: Build Android APK & AAB
        run: |
          flutter build apk --release --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          flutter build appbundle --release --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}

      - name: Deploy Android Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: "v1.0.${{ github.run_number }}"
          name: "إصدار نجد AI المعتمد رقم ${{ github.run_number }} 🛠️"
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Recreate iOS Folder
        run: |
          rm -rf ios
          flutter create . --platforms=ios --org com.alnofaie.najdai

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS IPA 🍏
        run: |
          flutter build ios --release --no-codesign --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r Najd_AI_iOS.ipa Payload

      - name: Deploy iOS Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: "v1.0.${{ github.run_number }}"
          name: "إصدار نجد AI المعتمد رقم ${{ github.run_number }} 🛠️"
          files: Najd_AI_iOS.ipa
          
