name: Najd AI Ultimate System Generator (Android & iOS) 🚀

on:
  repository_dispatch:
    types: [create_new_system]
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ✅ بدون حذف - فقط تحديث
      - name: Install Dependencies
        run: flutter pub get

      # ✅ التحقق من الـ Secrets
      - name: Verify Required Secrets
        run: |
          set -e
          [ -n "${{ secrets.OPENROUTER_API_KEY }}" ] || { echo "❌ OPENROUTER_API_KEY مفقود"; exit 1; }
          [ -n "${{ secrets.FIREBASE_WEB_API_KEY }}" ] || { echo "❌ FIREBASE_WEB_API_KEY مفقود"; exit 1; }
          echo "✅ جميع الـ Secrets موجودة"

      - name: Build Android APK & AAB
        run: |
          flutter build apk --release \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          flutter build appbundle --release \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}

      - name: Verify Build Artifacts
        run: |
          [ -f build/app/outputs/flutter-apk/app-release.apk ] || { echo "❌ APK فشل"; exit 1; }
          [ -f build/app/outputs/bundle/release/app-release.aab ] || { echo "❌ AAB فشل"; exit 1; }
          echo "✅ البناء نجح"

      - name: Deploy Android Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: "v1.0.${{ github.run_number }}"
          name: "إصدار نجد AI المعتمد رقم ${{ github.run_number }} 🛠️"
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS App
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}

      - name: Create iOS IPA Package
        run: |
          rm -rf Payload Najd_AI_iOS.ipa
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Najd_AI_iOS.ipa Payload/
          echo "✅ IPA جاهز"

      - name: Deploy iOS Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: "v1.0.${{ github.run_number }}"
          name: "إصدار نجد AI المعتمد رقم ${{ github.run_number }} 🛠️"
          files: Najd_AI_iOS.ipa
