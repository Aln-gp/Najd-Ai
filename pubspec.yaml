name: najd_ai
description: "نظام وتطبيق نجد AI الموحد الشامل مع الحسابات والشعار"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.1.6
  image_picker: ^1.0.7 # مكتبة اختيار الصور من الاستوديو أو الكاميرا
  file_picker: ^8.0.0  # مكتبة اختيار الملفات بجميع أنواعها

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false # 👈 حولناها إلى false مؤقتاً عشان نتخطى خطأ مسارات الآيفون المفقودة
  image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    
