name: "Najd AI Multi-Platform Core Engine 🚀"

on:
  repository_dispatch:
    types: [build_najd_project]
  workflow_dispatch:
    inputs:
      project_details:
        description: 'تفاصيل النظام أو التطبيق المطلوب برمجته'
        required: true
        default: 'تطبيق رياضي لنادي النصر السعودي'

jobs:
  build_and_release:
    name: "برمجة وبناء المشروع بذكاء نجد"
    runs-on: macos-latest # خوادم ماك لبناء كل المنصات سوا
    timeout-minutes: 45

    steps:
      - name: "📂 سحب الكود المصدري للمستودع"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "☕ تهيئة بيئة Java JDK 17"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: "🌾 تهيئة وإعداد محرك فلوتر المستقر"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      - name: "🔍 فحص متطلبات النظام والاتصال"
        run: |
          flutter doctor -v
          echo "تم فحص المتطلبات بنجاح ومنصة نجد جاهزة للانطلاق."

      - name: "📦 تحميل حزم ومكاتب فلوتر"
        run: |
          flutter pub clean
          flutter pub get

      # تم التحديث هنا ليقرأ من التوكن الجديد والمسموح GH_TOKEN بدون حظر
      - name: "🔐 حقن مفاتيح الحماية والـ APIs سراً"
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GITHUB_TOKEN=${{ secrets.GH_TOKEN }}" >> .env
          echo "تجهيز ملف البيئة المحمي بنجاح."

      - name: "🤖 بناء ملف أندرويد APK (Release)"
        run: |
          flutter build apk --release --split-per-abi
          flutter build apk --release --target-platform android-arm64

      - name: "🌐 بناء موقع الويب والألعاب الإلكترونية"
        run: |
          flutter build web --release --base-href "/"

      - name: "🍏 بناء وتجهيز تطبيق الآيفون (iOS No-Sign)"
        run: |
          flutter build ios --release --no-codesign

      - name: "📦 أرشفة وضغط ملفات الويب والآيفون"
        run: |
          mkdir -p build/najd_outputs
          cp build/app/outputs/flutter-apk/app-release.apk build/najd_outputs/Najd_Android_App.apk
          cd build/web && zip -r ../najd_outputs/Najd_Web_Project.zip . && cd ../..
          cd build/ios/iphoneos && zip -r ../../najd_outputs/Najd_iOS_App.zip Runner.app && cd ../../..

      - name: "📤 رفع الملفات النهائية إلى خادم نجد الآمن"
        uses: actions/upload-artifact@v4
        with:
          name: "Najd-AI-Super-Outputs"
          path: build/najd_outputs/
          retention-days: 5
          overwrite: true

      - name: "🎉 إرسال إشعار النجاح النهائي وإغلاق الدائرة"
        run: |
          echo "تم الانتهاء من بناء الأندرويد، الآيفون، والموقع بنجاح تام."
          echo "المحرك مستعد لتسليم الملفات للمستخدم بأمان كامل 🏁."
          
