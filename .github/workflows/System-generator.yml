name: Najd AI Ultimate System Generator (Android & iOS) 🚀

on:
  repository_dispatch:
    types: [create_new_system]
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # رجعنا لأحدث إصدار مستقر ليتوافق مع مكتباتك الحديثة مثل http

      # 🪄 خطوة سحرية لإصلاح الـ v1 embedding وتحديث ملف MainActivity تلقائياً ليعمل على الإصدارات الحديثة
      - name: Fix Android v1 embedding issue
        run: |
          MAIN_ACTIVITY_PATH=$(find android/app/src/main -name "MainActivity.kt" -o -name "MainActivity.java")
          if [ -f "$MAIN_ACTIVITY_PATH" ]; then
            echo "جاري تحديث MainActivity إلى v2 embedding..."
            if [[ "$MAIN_ACTIVITY_PATH" == *.kt ]]; then
              echo -e "package com.example.najd_ai\n\nimport io.flutter.embedding.android.FlutterActivity\n\nclass MainActivity: FlutterActivity() {\n}" > "$MAIN_ACTIVITY_PATH"
            else
              echo -e "package com.example.najd_ai;\n\nimport io.flutter.embedding.android.FlutterActivity;\n\npublic class MainActivity extends FlutterActivity {\n}" > "$MAIN_ACTIVITY_PATH"
            fi
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK & AAB
        run: |
          flutter build apk --release --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          flutter build appbundle --release --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}

      - name: Deploy Android Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: "v1.0.${{ github.run_number }}"
          name: "إصدار نجد AI المعتمد رقم ${{ github.run_number }} 🛠️"
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS IPA 🍏
        run: |
          flutter build ios --release --no-codesign --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r Najd_AI_iOS.ipa Payload

      - name: Deploy iOS Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: "v1.0.${{ github.run_number }}"
          name: "إصدار نجد AI المعتمد رقم ${{ github.run_number }} 🛠️"
          files: Najd_AI_iOS.ipa
          
