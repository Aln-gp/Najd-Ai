name: Najd AI Ultimate System Generator (Dockerized Stable Build) 🚀

on:
  repository_dispatch:
    types: [create_new_system]
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: cirrusci/flutter:stable
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      # 1. تطهير كلي للمجلدات وبناء الهيكل الجديد مع إجبار اسم المشروع على صيغة صحيحة (najd_ai)
      - name: Clean & Fresh Structure
        run: |
          rm -rf android ios
          flutter create . --project-name=najd_ai --platforms=android --org com.alnofaie.najdai

      # 2. تحميل المكاتب في البيئة النظيفة
      - name: Fetch Dependencies
        run: flutter pub get

      # 3. البناء المباشر للملفات
      - name: Build Production APK & AAB
        run: |
          flutter build apk --release \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          
          flutter build appbundle --release \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}

      # 4. رفع الملفات الجاهزة للريليز
      - name: Deploy Android Artifacts
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: "v1.0.${{ github.run_number }}"
          name: "إصدار نجد AI المعتمد رقم ${{ github.run_number }} 🛠️"
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      # إصلاح نفس المشكلة في خطوة الـ iOS
      - name: Fresh iOS Rebase
        run: |
          rm -rf ios
          flutter create . --project-name=najd_ai --platforms=ios --org com.alnofaie.najdai

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Compile iOS IPA
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            --dart-define=FIREBASE_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r Najd_AI_iOS.ipa Payload

      - name: Deploy iOS Artifact
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag_name: "v1.0.${{ github.run_number }}"
          name: "إصدار نجد AI المعتمد رقم ${{ github.run_number }} 🛠️"
          files: Najd_AI_iOS.ipa
          
